spring:
  application:
    name: yu-ai-agent
  ai:
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
            model: text-embedding-v4
            dimensions: 1536
  ollama:
    base-url: http://localhot:11434
    chat:
      model: deepseek-r1:1.5b
  vectorstore:
    pgvector:
      index-type: HNSW
      dimensions: 1536
      distance-type: COSINE_DISTANCE
      max-document-batch-size: 10000
server:
  port: 8123
  servet:
    context-path: /api
# springdoc-openapi接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn