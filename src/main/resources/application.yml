spring:
  profiles:
    active: local
  application:
    name: yu-ai-agent
  ai:
    chat:
      options:
        model: qwen-plus
  ollama:
    base-url: http://localhot:11434
    chat:
      model: deepseek-r1:1.5b
  mcp:
    client:
      stdio:
        servers-configuration: classpath:mcp-servers.json
  vectorstore:
    pgvector:
      index-type: HNSW
      dimensions: 1536
      distance-type: COSINE_DISTANCE
      max-document-batch-size: 10000
server:
  port: 8123
  servet:
    context-path: /api
# springdoc-openapi接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
#修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG